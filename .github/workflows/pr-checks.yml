name: PR Checks

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  lint-markdown:
    name: Lint Markdown
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v17
        with:
          globs: "**/*.md"

  validate-docs:
    name: Validate Docs Standard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run local docs validator
        run: python3 skills/repo-memory/scripts/validate-docs.py --skill-repo .
